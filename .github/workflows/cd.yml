name: Deploy Code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.167
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            bash -lc 'source ~/.bashrc >/dev/null 2>&1 || true && source ~/.profile >/dev/null 2>&1 || true && cd /home/ubuntu/ci-cd-test && git pull && pnpm install && pm2 restart 0'
