name: Deploy Code

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Deploy on Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                   host: 210.79.128.167
                   username: ubuntu
                   key: ${{ secrets.PRIVATE_KEY }}
                   script: |
                       cd /home/ubuntu/ci-cd-test
                       git pull
                       pnpm install
                       pm2 restart 0