name: Deploy Code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker images
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/ci-test:latest .
          docker push ${{ vars.DOCKERHUB_USERNAME }}/ci-test:latest

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.128.167
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            docker stop ci-test || true
            docker rm -f ci-test || true
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/ci-test:latest
            docker run -d --name ci-test -p 8000:8000 ${{ vars.DOCKERHUB_USERNAME }}/ci-test:latest
